[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

# Blog pages: short edge cache + long stale-while-revalidate. Eliminates the
# cold-start TTFB hit on /blog (the index loads the full blog-posts module)
# while keeping new posts visible within 10 minutes. SWR lets the edge serve
# stale HTML instantly while revalidating in the background.
[[headers]]
  for = "/blog"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=86400"

[[headers]]
  for = "/blog/*"
  [headers.values]
    Cache-Control = "public, max-age=600, stale-while-revalidate=86400"

# Basic security + performance headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Link = "</.well-known/api-catalog>; rel=\"api-catalog\"; type=\"application/linkset+json\", </openapi.json>; rel=\"service-desc\"; type=\"application/json\""
    # CSP is managed via Cloudflare Response Header Transform Rules

[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/.well-known/agent-skills/index.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/.well-known/agent-skills/*/SKILL.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

